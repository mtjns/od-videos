title: "OD Videos"
tagline: "Váš příběh z blízka i výšky"
# Google/SEO meta description (kept under ~155 chars so it isn't truncated in search
# results). The longer share/social blurb lives in og_description on the home page.
description: "Tvoříme realitní i firemní videa, reklamy, obsah na sociální sítě i svatební filmy. Vaši představu natočíme a profesionálně zpracujeme do finální podoby."
logo: "/assets/images/logo/logo-color.png"

url: "https://odvideos.cz"
baseurl: ""

lang: cs-CZ

# Default social-share image (Open Graph / Twitter) applied to every page unless a
# page overrides it with `image:` in its front matter. Sized 1200×630 (1.91:1).
defaults:
  - scope:
      path: ""
    values:
      image:
        path: "/assets/images/og-image.jpg"
        width: 1200
        height: 630
        alt: "OD Videos — realitní a letecká videotvorba"

author:
  name: "Ondřej Demuth"
  email: "od.videomaker@gmail.com"


social:
  name: "OD Videos"
  links:
    - https://www.instagram.com/od_videos/

# Render link previews with a large image on X/Twitter and other consumers.
# Fill in `username` (without @) once/if a Twitter/X profile exists — jekyll-seo-tag
# then emits twitter:site / twitter:creator automatically.
twitter:
  card: summary_large_image
  # username: od_videos

# Facebook Open Graph extras — fill in if/when a Facebook page or app exists.
# jekyll-seo-tag emits fb:app_id / article:publisher from these.
# facebook:
#   app_id:
#   publisher: "https://www.facebook.com/your-page"

# Google Apps Script Web App URL that receives /recenze form submissions.
# Deploy the script in google-apps-script/ and paste the .../exec URL here.
# Leave empty for demo mode (responses are not saved).
google_script_url: "https://script.google.com/macros/s/AKfycbzLYbTCqQThUhjZGEr-5n2vUkN_Yv1cate8v3HLJXNwPx8DseF5gpL9-MLlbmMcarHj/exec"

permalink: pretty


# Exclude raw development files from the production build
exclude:
  - .devcontainer/
  - Gemfile
  - Gemfile.lock
  - old/
  - .git/
  - README.md
  - TODO.md
  - google-apps-script/

# Required plugins for SEO and sitemap generation
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap