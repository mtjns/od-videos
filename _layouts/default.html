<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Resolve theme before first paint to avoid a flash:
         stored choice wins, otherwise follow the OS setting, otherwise default to dark. -->
    <script>
        (function () {
            try {
                var stored = localStorage.getItem('theme');
                if (stored === 'light') return;
                if (stored === 'dark' || window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.documentElement.classList.add('dark');
                }
            } catch (e) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

    {% seo %}

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Semantic, theme-aware color tokens. Actual values live in CSS variables
        // (assets/css/main.css) and flip between light and dark via the `.dark` class.
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        base: 'hsl(var(--bg) / <alpha-value>)',
                        surface: 'hsl(var(--surface) / <alpha-value>)',
                        fg: 'hsl(var(--fg) / <alpha-value>)',
                        muted: 'hsl(var(--muted) / <alpha-value>)',
                        line: 'hsl(var(--line) / <alpha-value>)',
                        brand: 'hsl(var(--brand) / <alpha-value>)',
                        onbrand: 'hsl(0 0% 8% / <alpha-value>)',
                    },
                },
            },
        };
    </script>
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
    <style>
        /* Override Chrome/Webkit autofill styles so they follow the active theme */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active,
        textarea:-webkit-autofill,
        textarea:-webkit-autofill:hover,
        textarea:-webkit-autofill:focus,
        select:-webkit-autofill,
        select:-webkit-autofill:hover,
        select:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 30px transparent inset !important;
            -webkit-text-fill-color: hsl(var(--fg)) !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        /* Hide default dropdown arrow in IE/Edge */
        select::-ms-expand {
            display: none;
        }
    </style>
</head>

<body>
    {% include nav.html %}

    {{ content }}

    {% include footer.html %}

    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>

</html>
